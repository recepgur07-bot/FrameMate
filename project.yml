name: VideoRecorder
localizations: [tr, en]
options:
  minimumXcodeGenVersion: 2.42.0

  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  FrameMate:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/VideoRecorderApp
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Sounds/baslama.wav
        buildPhase: resources
      - path: Resources/Sounds/bitis.wav
        buildPhase: resources
      - path: Resources/Sounds/ara.wav
        buildPhase: resources
      - path: Resources/Sounds/yeni-ses.wav
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - framework: IOKit.framework
        embed: false
    settings:
      base:
        PRODUCT_NAME: FrameMate
        PRODUCT_MODULE_NAME: FrameMate
        PRODUCT_BUNDLE_IDENTIFIER: com.recepgur.VideoRecorder
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        CODE_SIGN_ENTITLEMENTS: VideoRecorder.entitlements
        DEVELOPMENT_TEAM: 9MA297YYN2
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.recepgur.VideoRecorder macos"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: "FrameMate"
        NSCameraUsageDescription: "Kadraj yönlendirmesi ve video kaydı için kameraya erişim gerekiyor."
        NSMicrophoneUsageDescription: "Videoları sesli kaydetmek için mikrofona erişim gerekiyor."
        NSScreenCaptureUsageDescription: "Ekranı kaydetmek için ekran yakalama iznine ihtiyaç var."
        NSHumanReadableCopyright: "Copyright © 2026 Recep Gür. All rights reserved."
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: "public.app-category.video"
        CFBundleIconFile: "AppIcon"
        NSSpeechUsageDescription: "Kadraj koçluğu talimatlarını sesli olarak iletmek için ses sentezi kullanılır."
    scheme:
      testTargets:
        - FrameMateTests
  FrameMateTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/VideoRecorderAppTests
    dependencies:
      - target: FrameMate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recepgur.FrameMateTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FrameMate.app/Contents/MacOS/FrameMate"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
